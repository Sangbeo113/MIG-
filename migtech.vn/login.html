    <title>Đăng Nhập</title>
</head>

<body>
    <!-- top bar -->
    <main class="login">
        <div class="container">
            <div class="login__logo">
                <a href="index.html">
                    
                    <img class="login__logo-img" src="uploads/images/logos/b3af1ded-48ca-497b-9b37-c8a1dcc3ab92-logo-migtech.vn-02.png" alt="logo migtech.vn 02" />
                    
    
                </a>
            </div>
        </div>
        <div class="container">
            <div class="login__row">
                <div class="row g-3">
                    <div class="col-xxl-6 col-xl-6 col-lg-6 col-md-12 col-sm-12 col-12">
                        <!-- logo -->
                        <div class="login__avatar">
                            <img src="images/girl.svg" alt="" class="login__img" />
                        </div>
                    </div>
                    <div class="col-xxl-6 col-xl-6 col-lg-6 col-md-12 col-sm-12 col-12">
                        <section class="login-form">
                            <h1 class="login-form__title">Đăng nhập</h1>
    
                            <form action="https://migtech.vn/login" method="post">
                                <div class="login__form">
                                    <div class="login__form-group">
                                        <label class="login__form-label" for="email">Email:</label>
                                        <input class="login__form-input" type="email" name="email" id="email" placeholder="tom@exampple.com" required pattern="^[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$" minlength="8" />
                                    </div>
    
                                    <div class="login__form-group">
                                        <label class="login__form-label" for="password">Password:</label>
                                        <input class="login__form-input" type="password" name="password" id="password" required placeholder="Tom@123..." />
                                    </div>
                                </div>
                                <button class="login__submit" type="submit">
                                    Đăng nhập
                                </button>
                            </form>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
